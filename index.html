    function playSuccessSound() { playBeep(880, 0.1, 'sine'); setTimeout(function() { playBeep(1100, 0.15, 'sine'); }, 100); }

    function exportToExcel(records, filename) {
        var header = 'ИП\tМаркетплейс\tСклад\tАртикул\tКоличество\tСумма (₽)\tДата\n';
        var rows = records.map(function(r) { var date = r.dateStr ? r.dateStr.split(',')[0] : '—'; return (r.ip || '—')+'\t'+(r.marketplace || '—')+'\t'+((r.locationDisplay || '—').replace(/\t/g, ' '))+'\t'+(r.article || '—')+'\t'+r.quantity+'\t'+((r.earned || 0).toFixed(2))+'\t'+date; }).join('\n');
        var BOM = '\uFEFF';
        var blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = (filename || 'export')+'_'+getTodayStr()+'.csv';
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    async function addRecord(article,qty,uid,uname,mp,ld,lr,ip){ if(!article||!mp||!ld) return { success: false, error: 'Заполните все поля' }; const q = parseInt(qty); if(isNaN(q)||q<=0) return { success: false, error: 'Количество > 0' }; const today = getTodayStr(); const tr = await db.collection('pack_records').where('userId','==',uid).where('dateOnly','==',today).get(); const at = tr.docs.reduce(function(s,d){ return s+d.data().quantity; },0); let earned=0, rem=q, cq=at; const tiers = [{limit:1000,rate:2.5},{limit:2000,rate:2.75},{limit:3000,rate:3.0},{limit:Infinity,rate:3.25}]; for(var i=0; i<tiers.length; i++){ var t=tiers[i]; if(rem<=0)break; if(cq>=t.limit)continue; var av=t.limit-cq; var take=Math.min(rem,av); earned+=take*t.rate; rem-=take; cq+=take; } await db.collection('pack_records').add({ userId:uid, userName:uname, article:article.trim().toUpperCase(), quantity:q, earned, marketplace:mp, locationDisplay:ld, locationRaw:lr||ld, ip:ip||'', timestamp:firebase.firestore.FieldValue.serverTimestamp(), dateStr:new Date().toLocaleString(), dateOnly:today }); return { success: true, earned }; }

    // ============ Расчёт зарплаты ============
    async function calculateSalary(uid, startDate, endDate) {
        var q = db.collection('pack_records').where('userId','==',uid).where('dateOnly','>=',startDate).where('dateOnly','<=',endDate);
        var snapshot = await q.orderBy('dateOnly').get();
        
        var records = snapshot.docs.map(function(d) { return { id: d.id, ...d.data() }; });
        
        // Группируем по дням
        var byDay = {};
        records.forEach(function(r) {
            var day = r.dateOnly;
            if (!byDay[day]) byDay[day] = { qty: 0, earned: 0 };
            byDay[day].qty += r.quantity;
            byDay[day].earned += r.earned || 0;
        });
        
        // Группируем по ИП
        var byIP = {};
        records.forEach(function(r) {
            var ip = r.ip || 'Без ИП';
            if (!byIP[ip]) byIP[ip] = { qty: 0, earned: 0 };
            byIP[ip].qty += r.quantity;
            byIP[ip].earned += r.earned || 0;
        });
        
        // Группируем по маркетплейсу
        var byMP = {};
        records.forEach(function(r) {
            var mp = r.marketplace || '—';
            if (!byMP[mp]) byMP[mp] = { qty: 0, earned: 0 };
            byMP[mp].qty += r.quantity;
            byMP[mp].earned += r.earned || 0;
        });
        
        var totalQty = records.reduce(function(s,r) { return s + r.quantity; }, 0);
        var totalEarned = records.reduce(function(s,r) { return s + (r.earned || 0); }, 0);
        var daysWorked = Object.keys(byDay).length;
        
        return {
            records: records,
            byDay: byDay,
            byIP: byIP,
            byMP: byMP,
            totalQty: totalQty,
            totalEarned: totalEarned,
            daysWorked: daysWorked,
            startDate: startDate,
            endDate: endDate
        };
    }

            const start=(currentPage-1)*PER_PAGE,pageRecords=allFilteredRecords.slice(start,start+PER_PAGE),tq=allFilteredRecords.reduce(function(s,r){ return s+r.quantity; },0),te=allFilteredRecords.reduce(function(s,r){ return s+(r.earned||0); },0);
            let pHtml='';if(totalPages>1){pHtml='<div style="display:flex;gap:6px;justify-content:center;align-items:center;margin-top:12px;"><button class="page-btn" data-page="1" '+(currentPage===1?'disabled':'')+' type="button">««</button><button class="page-btn" data-page="'+(currentPage-1)+'" '+(currentPage===1?'disabled':'')+' type="button">«</button><span style="font-size:0.8rem;padding:0 8px;">Стр. '+currentPage+' из '+totalPages+'</span><button class="page-btn" data-page="'+(currentPage+1)+'" '+(currentPage===totalPages?'disabled':'')+' type="button">»</button><button class="page-btn" data-page="'+totalPages+'" '+(currentPage===totalPages?'disabled':'')+' type="button">»»</button></div>';}
            container.innerHTML='<div class="summary-card"><span>📦 <strong>'+tq+' шт.</strong></span><span>💰 <strong>'+te.toFixed(2)+' руб.</strong></span><span>📋 Всего: '+allFilteredRecords.length+'</span><span>👥 Сотрудников: '+new Set(allFilteredRecords.map(function(r){ return r.userId; })).size+'</span>'+(totalPages>1?'<span>📄 Стр. '+currentPage+'/'+totalPages+'</span>':'')+'<button id="exportFilteredBtn" class="page-btn" style="margin-left:auto;" type="button">📥 Экспорт</button></div><div style="overflow-x:auto;"><table><thead><tr><th>ИП</th><th>МП</th><th>Склад</th><th>Артикул</th><th>Кол-во</th><th>₽</th><th>Сотрудник</th><th></th></tr></thead><tbody>'+pageRecords.map(function(r){ return '<tr><td>'+(r.ip?'<span class="ip-badge ip-'+r.ip+'">'+r.ip+'</span>':'—')+'</td><td><span class="marketplace-badge '+(r.marketplace==='WB'?'badge-wb':'badge-ozon')+'">'+r.marketplace+'</span></td><td>'+escapeHtml(r.locationDisplay||'—')+'</td><td><strong>'+escapeHtml(r.article)+'</strong></td><td>'+r.quantity+'</td><td>'+((r.earned||0).toFixed(2))+'</td><td>'+escapeHtml(r.userName)+'</td><td><button class="adminDelBtn" data-id="'+r.id+'" type="button">🗑️</button></td></tr>'; }).join('')+'</tbody></table></div>'+pHtml;
            container.querySelectorAll(".adminDelBtn").forEach(function(b){ b.onclick=async function(){ if(b.dataset.id&&confirm("Удалить запись?")){await deleteRecord(b.dataset.id);allFilteredRecords=allFilteredRecords.filter(function(r){ return r.id!==b.dataset.id; });const tp=Math.ceil(allFilteredRecords.length/PER_PAGE);if(currentPage>tp) currentPage=Math.max(1,tp);renderPage(container);} }; });
            container.querySelectorAll(".page-btn:not([disabled])").forEach(function(b){ b.onclick=function(){ const page=parseInt(b.dataset.page); if(page>=1&&page<=totalPages&&page!==currentPage){currentPage=page;renderPage(container);} }; });
            const exportFilteredBtn = container.querySelector('#exportFilteredBtn'); if (exportFilteredBtn) { exportFilteredBtn.onclick = function() { exportToExcel(allFilteredRecords, 'Отфильтрованные_записи'); }; }
        }
    }
    
    function formatDateForDisplay(s) { if(!s) return '—'; var p = s.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
    
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') stopScanner(); });
    window.addEventListener("DOMContentLoaded", function() { renderApp(); });
    window.addEventListener('beforeunload', function() { stopScanner(); });
</script>
</body>
