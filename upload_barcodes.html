            'OZN217139525': '21009/08', 'OZN217737635': '21002', 'OZN217736945': '21008/01',
            'OZN217741691': '21008/02', 'OZN217749128': '21009/01', 'OZN218131958': '21009/05',
            'OZN217748987': '21010', 'OZN218068730': '21009/02', 'OZN946222349': '20006-2/01.2',
            'OZN956814861': '20007-2/01.2', 'OZN441159356': '10008/01.2',
        };
        
        document.getElementById('totalCount').textContent = Object.keys(BARCODE_DB).length;
        
        function log(msg) {
            const el = document.getElementById('log');
            el.innerHTML += '<br>' + msg;
            el.scrollTop = el.scrollHeight;
        }
        
        async function startUpload() {
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            
            const entries = Object.entries(BARCODE_DB);
            const total = entries.length;
            let uploaded = 0;
            let skipped = 0;
            
            log(`<span class="info">Начинаю загрузку ${total} штрихкодов...</span>`);
            
            for (const [barcode, article] of entries) {
                try {
                    const snap = await db.collection('barcodes')
                        .where('barcode', '==', barcode)
                        .limit(1)
                        .get();
                    
                    if (snap.empty) {
                        await db.collection('barcodes').add({
                            barcode: barcode,
                            article: article,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        uploaded++;
                    } else {
                        skipped++;
                    }
                    
                    const progress = Math.round((uploaded + skipped) / total * 100);
                    document.getElementById('progressBar').style.width = progress + '%';
                    document.getElementById('progressBar').textContent = progress + '% (' + (uploaded + skipped) + '/' + total + ')';
                    
                } catch (e) {
                    log(`❌ Ошибка: ${barcode} - ${e.message}`);
                }
            }
            
            log(`<span class="success">✅ Готово!</span>`);
            log(`Загружено: ${uploaded}`);
            log(`Пропущено (уже были): ${skipped}`);
            log(`Всего обработано: ${total}`);
            
            btn.textContent = '✅ Загрузка завершена';
        }
    </script>
