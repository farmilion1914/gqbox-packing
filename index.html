<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAWmeGhe0wFrqULYqvnCX4WY9EhuPFEjHs",
            authDomain: "packing23-11afd.firebaseapp.com",
            projectId: "packing23-11afd",
            storageBucket: "packing23-11afd.firebasestorage.app",
            messagingSenderId: "786002108142",
            appId: "1:786002108142:web:213b1f60bd6ec5f9429dff",
            measurementId: "G-KJSR3NESZM"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence().catch(console.warn);
        
        function initTheme() {
            const s = localStorage.getItem('gqbox_theme');
            const t = document.getElementById('themeToggleFixed');
            if (s === 'dark') { document.body.classList.add('dark-theme'); t.textContent = '☀️'; }
            else { t.textContent = '🌙'; }
            t.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('gqbox_theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
                t.textContent = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
            });
        }
        
        const WB_CITIES = ["Казань","Краснодар","Невинномысск","Екатеринбург","Шушары","Челябинск","Великий Камень","Тула","Коледино","Электросталь","Волгоград","Владимир","Рязань","Воронеж","Новосибирск","Сарапул","Котовск","Чехов 1","Чехов 2","Обухово"];
        const OZON_STORES = { direct: ["Хоругвино","Софьино","Пушкино 2","Пушкино 1","Ватутинки","Петровское","Гривно","Домодедово","Жуковский","Ногинск (прям.)"], crossdock: ["Радумля","Ногинск"] };
        const ALL_OZON_STORES = [...OZON_STORES.direct, ...OZON_STORES.crossdock];
        
        let currentUser = null, employees = [];
        const SESSION_KEY = "gqbox_session";
        function saveSession(u) { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
        function getSession() { const r = localStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; }
        function clearSession() { localStorage.removeItem(SESSION_KEY); }
        function getTodayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        function isCrossdock(s) { return OZON_STORES.crossdock.includes(s); }
        
        async function getEmployees() {
            const snap = await db.collection('employees').orderBy('name').get();
            let emps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (emps.length === 0) {
                await db.collection('employees').add({ login: 'safonova', password: 'admin0111', name: 'Сафонова Е.', role: 'admin' });
                const s2 = await db.collection('employees').orderBy('name').get();
                emps = s2.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            employees = emps;
            return emps;
        }
        
        async function loginUser(l, p) {
            const all = await db.collection('employees').get();
            if (all.empty) await getEmployees();
            const snap = await db.collection('employees').where('login','==',l).where('password','==',p).get();
            return snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() };
        }
        
        async function registerUser(l, p, n) {
            if (!l || !p || !n) return { success: false, error: 'Заполните все поля' };
            const snap = await db.collection('employees').where('login','==',l).get();
            if (!snap.empty) return { success: false, error: 'Логин уже существует' };
            await db.collection('employees').add({ login: l.trim(), password: p, name: n.trim(), role: 'packer' });
            return { success: true };
        }
        
        async function getUserSavedLocation(uid) {
            const snap = await db.collection('user_locations').where('userId','==',uid).get();
            return snap.empty ? null : snap.docs[0].data();
        }
        
        async function saveUserLocation(uid, mp, ld, lr) {
            const snap = await db.collection('user_locations').where('userId','==',uid).get();
            const data = { userId: uid, marketplace: mp, locationDisplay: ld, locationRaw: lr, timestamp: Date.now() };
            if (snap.empty) await db.collection('user_locations').add(data);
            else await db.collection('user_locations').doc(snap.docs[0].id).update(data);
        }
        
        async function addRecord(article, qty, uid, uname, mp, ld, lr) {
            if (!article || !mp || !ld) return { success: false, error: 'Заполните все поля' };
            const q = parseInt(qty);
            if (isNaN(q) || q <= 0) return { success: false, error: 'Количество > 0' };
            const today = getTodayStr();
            const tr = await db.collection('pack_records').where('userId','==',uid).where('dateOnly','==',today).get();
            const at = tr.docs.reduce((s,d) => s + d.data().quantity, 0);
            let earned = 0, rem = q, cq = at;
            const tiers = [{limit:1000,rate:2.5},{limit:2000,rate:2.75},{limit:3000,rate:3.0},{limit:Infinity,rate:3.25}];
            for (const t of tiers) { if (rem <= 0) break; if (cq >= t.limit) continue; const av = t.limit - cq; const take = Math.min(rem, av); earned += take * t.rate; rem -= take; cq += take; }
            await db.collection('pack_records').add({ userId:uid, userName:uname, article:article.trim().toUpperCase(), quantity:q, earned, marketplace:mp, locationDisplay:ld, locationRaw:lr||ld, timestamp:firebase.firestore.FieldValue.serverTimestamp(), dateStr:new Date().toLocaleString(), dateOnly:today });
            return { success: true, earned };
        }
        
        async function getUserRecords(uid) {
            const snap = await db.collection('pack_records').where('userId','==',uid).orderBy('timestamp','desc').get();
            return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }
        
        async function getUserDayRecords(uid, date) {
            const snap = await db.collection('pack_records').where('userId','==',uid).where('dateOnly','==',date).orderBy('timestamp','desc').get();
            return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }
        
        async function getUserPeriodStats(uid, period) {
            const records = await getUserRecords(uid);
            const now = new Date(); let start = new Date();
            if (period === 'day') start.setHours(0,0,0,0);
            else if (period === 'week') { const day = now.getDay(); start.setDate(now.getDate() - (day===0?6:day-1)); start.setHours(0,0,0,0); }
            else if (period === 'month') start = new Date(now.getFullYear(), now.getMonth(), 1);
            const f = records.filter(r => { if (!r.timestamp) return false; const ts = r.timestamp.toDate ? r.timestamp.toDate() : new Date(r.timestamp); return ts >= start; });
            return { totalQty: f.reduce((s,r) => s + r.quantity, 0), totalEarned: f.reduce((s,r) => s + (r.earned||0), 0) };
        }
        
        async function getYesterdayRecords() {
            const y = new Date(); y.setDate(y.getDate()-1);
            const ds = y.toISOString().slice(0,10);
            const snap = await db.collection('pack_records').where('dateOnly','==',ds).get();
            return { records: snap.docs.map(d => ({ id: d.id, ...d.data() })), date: ds };
        }

        async function deleteUser(uid) {
            const doc = await db.collection('employees').doc(uid).get();
            if (!doc.exists || doc.data().role === 'admin') return false;
            const batch = db.batch();
            const recs = await db.collection('pack_records').where('userId','==',uid).get();
            recs.docs.forEach(d => batch.delete(d.ref));
            const locs = await db.collection('user_locations').where('userId','==',uid).get();
            locs.docs.forEach(d => batch.delete(d.ref));
            batch.delete(db.collection('employees').doc(uid));
            await batch.commit();
            return true;
        }

                const emp = employees.find(e => e.id === eid);
                const dr = await getUserDayRecords(eid, date);
                if (dr.length === 0) { c.innerHTML=`<div style="padding:10px;">📭 Нет операций у ${escapeHtml(emp.name)} за ${date}</div>`; return; }
                const tq = dr.reduce((s,r)=>s+r.quantity,0), te = dr.reduce((s,r)=>s+(r.earned||0),0);
                c.innerHTML = `<div class="summary-card"><span>👤 ${escapeHtml(emp.name)}</span><span>📅 ${new Date(date).toLocaleDateString('ru-RU')}</span><span>📦 ${tq} шт.</span><span>💰 ${te.toFixed(2)} руб.</span></div><div class="table-wrap"><table><thead><tr><th>МП</th><th>Склад</th><th>Артикул</th><th>Кол-во</th><th>₽</th><th></th></tr></thead><tbody>${dr.map(r=>`<tr><td><span class="marketplace-badge ${r.marketplace==='WB'?'badge-wb':'badge-ozon'}">${r.marketplace}</span></td><td>${escapeHtml(r.locationDisplay||'—')}</td><td>${escapeHtml(r.article)}</td><td>${r.quantity}</td><td>${(r.earned||0).toFixed(0)}</td><td><span class="delete-icon" data-id="${r.id}">🗑️</span></td></tr>`).join('')}</tbody></table></div>`;
                c.querySelectorAll('.delete-icon').forEach(el => el.addEventListener('click', async (e) => { e.stopPropagation(); if(confirm('Удалить?')){await deleteRecord(el.dataset.id); document.getElementById('af').click();} }));
            });
            document.getElementById('addEmp')?.addEventListener('click', async () => {
                const n = prompt('Фамилия нового сотрудника:');
                if (n) {
                    const l = n.toLowerCase().replace(/\s/g,'');
                    await db.collection('employees').add({ login: l, password: '123', name: n.trim(), role: 'packer' });
                    await getEmployees();
                    renderMain();
                }
            });
            document.querySelectorAll('.delete-icon[data-uid]').forEach(el => el.addEventListener('click', async (e) => {
                if (confirm(`Удалить ${el.dataset.uname}?`)) { await deleteUser(el.dataset.uid); await getEmployees(); renderMain(); }
            }));
            updateOnlineStatus();
        }
        
        function updateOnlineStatus() {
            const el = document.querySelector('#syncStatus');
            if (!el) return;
            el.innerHTML = navigator.onLine ? '<span class="online-indicator"></span> Онлайн' : '<span class="online-indicator offline-indicator"></span> Офлайн';
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
        }
        
        async function init() {
            initTheme();
            await getEmployees();
            const session = getSession();
            if (session) {
                currentUser = session;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                await renderMain();
            } else {
                attachLoginEvents();
            }
        }
        
        init();
    </script>
</body>
</html>
